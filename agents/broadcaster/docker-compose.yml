version: "3.3"
services:
  broadcaster:
    image: galacticcouncil/broadcaster:latest
    environment:
      - RPC_URL=
      - PRIVATE_KEY=
      - REFRESH_INTERVAL=
      - CHANGE_THRESHOLD=
      - ETH_RPC_URL=
      - ETH_PRIVATE_KEY=
      - ETH_EMITTER=
      - ETH_CHAIN_ID=
      - ETH_EMITTER_BLOCK=
      - ETH_SYMBOLS=
    volumes:
      - db:/app/.db
    configs:
      - source: thresholds
        target: /app/thresholds.json
    networks:
      - default
    logging:
      driver: json-file
    deploy:
      labels:
        swarmpit.service.deployment.autoredeploy: "true"
networks:
  default:
    driver: overlay
volumes:
  db:
    driver: local
configs:
  thresholds:
    external: true
    name: whm_broadcaster_thresholds

version: "3.3"
services:
  app:
    image: galacticcouncil/nintent:latest
    environment:
      - ETH_WSS=
      - INTENT_RECEIVER=
    ports:
      - "8080:8080"
    networks:
      - default
    logging:
      driver: json-file
    deploy:
      labels:
        swarmpit.service.deployment.autoredeploy: "true"
networks:
  default:
    driver: overlay

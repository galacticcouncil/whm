<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>scan</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #131316;
        --border: #27272a;
        --fg: #e4e4e7;
        --muted: #71717a;
        --info: #3b82f6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg);
        color: var(--fg);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      main {
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      img.logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      p {
        color: var(--muted);
        font-size: 13px;
        margin: 0 0 2rem;
      }
      .nav {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      a.btn {
        display: block;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--fg);
        text-decoration: none;
        padding: 1.5rem 1rem;
        font-size: 1rem;
        transition: border-color 0.15s;
      }
      a.btn:hover {
        border-color: var(--info);
        color: var(--info);
      }
      .btn .sub {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 0.25rem;
      }
      a.btn:hover .sub {
        color: var(--muted);
      }
      footer {
        margin-top: 2rem;
        color: #52525b;
        font-size: 12px;
      }
      footer .heart {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="/logo.png" alt="" />
      <h1>scan</h1>
      <p>whm cross-chain transfer explorer</p>
      <nav class="nav">
        <a class="btn" href="/basejump">basejump<span class="sub">EVM ↔ Hydration</span></a>
        <a class="btn" href="/intents">intents<span class="sub">NEAR-Intents bridge</span></a>
      </nav>
      <footer>Built with <span class="heart">♥</span> by hydration</footer>
    </main>
  </body>
</html>

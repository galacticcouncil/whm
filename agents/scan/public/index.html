<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>scan</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #131316;
        --border: #27272a;
        --fg: #e4e4e7;
        --muted: #71717a;
        --dim: #52525b;
        --ok: #22c55e;
        --warn: #eab308;
        --info: #3b82f6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg);
        color: var(--fg);
        margin: 0;
        padding: 2rem 1rem;
        font-size: 14px;
        line-height: 1.5;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }
      header .title {
        font-size: 1.1rem;
        color: var(--fg);
      }
      a {
        color: var(--info);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      code {
        font-family: inherit;
      }
      .feature {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1rem;
      }
      .feature-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
      }
      .feature-name {
        font-size: 1rem;
        text-transform: capitalize;
      }
      .counts {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .count {
        color: var(--muted);
        font-size: 12px;
      }
      .count b {
        color: var(--fg);
        font-weight: 600;
      }
      form.jump {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      form.jump input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--fg);
        font-family: inherit;
        font-size: 13px;
        padding: 0.4rem 0.6rem;
        min-width: 0;
      }
      form.jump button {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--fg);
        font-family: inherit;
        font-size: 13px;
        padding: 0.4rem 0.9rem;
        cursor: pointer;
      }
      form.jump button:hover {
        border-color: var(--info);
      }
      .recent {
        display: grid;
        gap: 0.35rem;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 13px;
      }
      .row .id {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pill {
        font-size: 11px;
        padding: 0.05rem 0.5rem;
        border-radius: 999px;
        color: var(--muted);
        background: rgba(113, 113, 122, 0.12);
        flex-shrink: 0;
      }
      .empty {
        color: var(--dim);
        font-size: 13px;
      }
      .meta {
        color: var(--dim);
        font-size: 12px;
        margin-top: 1.5rem;
        display: flex;
        justify-content: space-between;
      }
      .meta .heart {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="/logo.png" alt="" width="48" height="48" style="object-fit: contain" />
        <span class="title">scan — whm event indexer</span>
      </header>
      <div id="root"><div class="empty">loading…</div></div>
      <div class="meta">
        <span id="chains"></span>
        <span>Built with <span class="heart">♥</span> by hydration</span>
      </div>
    </main>

    <script>
      const ESCAPES = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
      const esc = (s) => (s == null ? "" : String(s).replace(/[&<>"']/g, (c) => ESCAPES[c]));
      const trunc = (s) => (s && s.length > 18 ? s.slice(0, 10) + "…" + s.slice(-6) : s);

      // Per-feature wiring: list endpoint, the id field on each row, and the detail path.
      const FEATURES = {
        basejump: { list: "/api/basejump/transfers", idField: "id", detail: "/basejump/" },
        intents: { list: "/api/intents", idField: "intent_id", detail: "/intents/" },
      };

      const root = document.getElementById("root");

      function countsHtml(counts) {
        const entries = Object.entries(counts || {});
        if (!entries.length) return "";
        return (
          '<div class="counts">' +
          entries
            .map(([k, v]) => `<span class="count">${esc(k)} <b>${esc(v)}</b></span>`)
            .join("") +
          "</div>"
        );
      }

      function rowHtml(cfg, item) {
        const id = item[cfg.idField];
        return `<div class="row"><span class="pill">${esc(item.state)}</span><a class="id" href="${esc(
          cfg.detail
        )}${encodeURIComponent(id)}"><code>${esc(trunc(id))}</code></a></div>`;
      }

      async function load() {
        let status = { features: {}, chains: {} };
        try {
          status = await (await fetch("/api/status")).json();
        } catch {}

        const names = Object.keys(status.features || {}).filter((n) => FEATURES[n]);
        // also include any locally-known feature even if status lacks counts
        for (const n of Object.keys(FEATURES)) if (!names.includes(n)) names.push(n);

        const sections = await Promise.all(
          names.map(async (name) => {
            const cfg = FEATURES[name];
            let recent = "";
            try {
              const data = await (await fetch(cfg.list + "?limit=8")).json();
              const items = data.items || [];
              recent = items.length
                ? '<div class="recent">' + items.map((it) => rowHtml(cfg, it)).join("") + "</div>"
                : '<div class="empty">no records yet</div>';
            } catch {
              recent = '<div class="empty">unavailable</div>';
            }
            return `
              <section class="feature">
                <div class="feature-head">
                  <span class="feature-name">${esc(name)}</span>
                  ${countsHtml(status.features?.[name])}
                </div>
                <form class="jump" onsubmit="return jump(event, '${esc(cfg.detail)}')">
                  <input name="id" placeholder="open by id (intentId / transfer id)…" autocomplete="off" />
                  <button type="submit">open</button>
                </form>
                ${recent}
              </section>`;
          }),
        );

        root.innerHTML = sections.join("");

        const chains = Object.entries(status.chains || {})
          .map(([n, c]) => `${esc(n)} @ ${esc(c.cursor ?? "—")}`)
          .join("  ·  ");
        document.getElementById("chains").textContent = chains;
      }

      function jump(ev, base) {
        ev.preventDefault();
        const v = ev.target.id.value.trim();
        if (v) location.href = base + encodeURIComponent(v);
        return false;
      }

      load();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>scan · intents</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #131316;
        --surface-2: #1a1a1f;
        --border: #27272a;
        --fg: #e4e4e7;
        --muted: #71717a;
        --dim: #52525b;
        --ok: #22c55e;
        --warn: #eab308;
        --info: #3b82f6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg);
        color: var(--fg);
        margin: 0;
        padding: 2rem 1rem;
        font-size: 14px;
        line-height: 1.5;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        color: var(--muted);
      }
      header .title {
        font-size: 1.1rem;
        letter-spacing: 0.01em;
        color: var(--fg);
      }
      header .logo {
        object-fit: contain;
      }
      a {
        color: var(--info);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      code {
        font-family: inherit;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem 2rem;
      }
      dl.details {
        margin: 0;
        display: grid;
        grid-template-columns: 8rem 1fr;
        gap: 0.6rem 2rem;
        align-items: start;
      }
      dl.details dt {
        color: var(--muted);
        font-weight: normal;
        text-align: right;
      }
      dl.details dd {
        margin: 0;
        word-break: break-all;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.1rem 0.55rem;
        border-radius: 999px;
        font-size: 12px;
      }
      .pill-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .pill.state-emitted {
        background: rgba(113, 113, 122, 0.15);
        color: var(--muted);
      }
      .pill.state-published {
        background: rgba(234, 179, 8, 0.12);
        color: var(--warn);
      }
      .pill.state-forwarded {
        background: rgba(59, 130, 246, 0.14);
        color: var(--info);
      }
      .pill.state-succeeded {
        background: rgba(34, 197, 94, 0.2);
        color: var(--ok);
      }
      .pill.state-refunded {
        background: rgba(234, 179, 8, 0.14);
        color: var(--warn);
      }
      .pill.state-failed {
        background: rgba(239, 68, 68, 0.16);
        color: #ef4444;
      }
      .party {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }
      .party-head {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }
      img.chain-badge {
        width: 18px;
        height: 18px;
        object-fit: contain;
      }
      .chain-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
      }
      .delta {
        color: var(--muted);
      }
      h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--fg);
        margin: 2.5rem 0 1rem;
        font-weight: normal;
      }
      .flow {
        color: var(--muted);
        margin-bottom: 1rem;
        font-size: 13px;
      }
      .flow .arrow {
        margin: 0 0.4rem;
        color: var(--dim);
      }
      .legs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 0.75rem;
      }
      @media (max-width: 900px) {
        .legs {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 640px) {
        dl.details {
          display: block;
        }
        dl.details dt {
          text-align: left;
          margin-top: 1rem;
        }
        dl.details dt:first-child {
          margin-top: 0;
        }
        dl.details dd {
          margin: 0.2rem 0 0;
        }
        .card {
          padding: 1.25rem 1.25rem;
        }
      }
      .leg {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        min-width: 0;
        overflow-wrap: anywhere;
      }
      .leg.pending {
        opacity: 0.5;
      }
      .leg-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }
      .leg-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .leg-kind {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .leg-body {
        color: var(--muted);
        font-size: 13px;
      }
      .leg-body > div {
        margin-bottom: 0.4rem;
      }
      .leg-body > div:last-child {
        margin-bottom: 0;
      }
      .leg-body .hash {
        color: var(--fg);
      }
      .check {
        color: var(--ok);
      }
      .meta {
        color: var(--dim);
        font-size: 12px;
        margin-top: 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        opacity: 0;
        animation: fadein 0.3s ease-out 0.3s forwards;
      }
      .meta .heart {
        color: #ef4444;
      }
      .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--dim);
        margin-right: 0.4rem;
        vertical-align: middle;
      }
      .dot.live {
        background: var(--ok);
      }
      .loading {
        color: var(--muted);
        opacity: 0;
        animation: fadein 0.3s ease-out 0.3s forwards;
      }
      .appear {
        animation: appear 0.2s ease-out;
      }
      @keyframes fadein {
        to {
          opacity: 1;
        }
      }
      @keyframes appear {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .flash {
        animation: flash 1s ease-out;
      }
      @keyframes flash {
        from {
          background: rgba(234, 179, 8, 0.08);
        }
        to {
          background: var(--surface);
        }
      }
      .spin {
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .leg-kind.pending {
        color: var(--warn);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img class="logo" src="/logo.png" alt="" width="48" height="48" />
        <span class="title">Intents</span>
      </header>
      <div id="root"><div class="loading">loading…</div></div>
      <div class="meta">
        <span><span class="dot" id="dot"></span><span id="conn">connecting…</span></span>
        <span>Built with <span class="heart">♥</span> by hydration</span>
      </div>
    </main>

    <script>
      // path is /intents/:id — take the last non-empty segment
      const ID = decodeURIComponent(location.pathname.split("/").filter(Boolean).pop() ?? "");
      const ESCAPES = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
      const esc = (s) => (s == null ? "" : String(s).replace(/[&<>"']/g, (c) => ESCAPES[c]));

      const root = document.getElementById("root");
      const connEl = document.getElementById("conn");
      const dotEl = document.getElementById("dot");

      // The native-ETH sentinel forwarded by IntentReceiver (lowercased).
      const NATIVE = "0xeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee";

      // Asset metadata, fetched once from /api/intents/tokens (Hydration source assets keyed by id,
      // 1Click destination assets keyed by 1Click asset id). Used to format amounts + show symbols.
      let TOKENS = { hydration: {}, dest: {} };

      const EXPLORER = {
        hydration: (e) => ({
          label: e.blockNumber + "-" + e.logIndex,
          url: "https://hydration.subscan.io/event/" + e.blockNumber + "-" + e.logIndex,
        }),
        moonbeam: (e) => ({ label: e.txHash, url: "https://moonscan.io/tx/" + e.txHash }),
        ethereum: (e) => ({ label: e.txHash, url: "https://etherscan.io/tx/" + e.txHash }),
      };

      const ADDR_EXPLORER = {
        hydration: (a) => "https://hydration.subscan.io/address/" + a,
        moonbeam: (a) => "https://moonscan.io/address/" + a,
        ethereum: (a) => "https://etherscan.io/address/" + a,
      };

      // NEAR-Intents explorer keyed by the (Ethereum) deposit address — shows the full 1Click
      // execution; and NEAR block explorer for the destination settlement tx.
      const NEAR_INTENTS_TX = (dep) => "https://explorer.near-intents.org/transactions/" + dep;
      const NEARBLOCKS_TX = (h) => "https://nearblocks.io/txns/" + h;

      // Per-destination-chain address explorer, keyed by the 1Click `blockchain` value (e.g. "near",
      // "zec"). Chains without an entry render the recipient as plain (uncopiable-but-selectable) code.
      const DEST_ADDR_EXPLORER = {
        near: (a) => "https://nearblocks.io/address/" + a,
        zec: (a) => "https://blockchair.com/zcash/address/" + a,
      };

      // Moonbeam Wormhole chain id + TokenBridge emitter — used to build the wormholescan link.
      const MOONBEAM_WORMHOLE_ID = 16;
      const MOONBEAM_TOKEN_BRIDGE = "b1731c586ca89a23809861c6103f0b96b3f57d92";

      function wormholeRef(t) {
        const seq = t.wormhole_sequence;
        if (!seq) return null;
        const id = `${MOONBEAM_WORMHOLE_ID}/${MOONBEAM_TOKEN_BRIDGE.padStart(64, "0")}/${seq}`;
        return { id, url: `https://wormholescan.io/#/tx/${id}` };
      }

      function fmtAmount(raw, decimals) {
        try {
          const n = BigInt(raw);
          const base = BigInt(10) ** BigInt(decimals);
          const whole = n / base;
          const frac = n % base;
          if (frac === 0n) return whole.toLocaleString("en-US");
          const fracStr = frac.toString().padStart(decimals, "0").replace(/0+$/, "");
          return whole.toLocaleString("en-US") + "." + fracStr;
        } catch {
          return String(raw);
        }
      }

      // Round a raw amount to N significant figures for display (4 by default). Browser-side, since
      // the page is static HTML; mirrors how the Hydration app humanizes amounts. Number precision
      // is fine here — we only keep a few significant digits anyway.
      function fmtSig(raw, decimals, sig) {
        try {
          const n = Number(BigInt(raw)) / Math.pow(10, decimals);
          if (!isFinite(n)) return fmtAmount(raw, decimals);
          return n.toLocaleString("en-US", { maximumSignificantDigits: sig || 4 });
        } catch {
          return fmtAmount(raw, decimals);
        }
      }

      // ETH/WETH amounts are 18-decimal, shown to 4 significant figures.
      const fmtEth = (raw) => (raw == null || raw === "" ? "—" : fmtSig(raw, 18, 4) + " ETH");

      function assetLabel(a) {
        if (!a) return "—";
        return a.toLowerCase() === NATIVE ? "ETH (native)" : a;
      }

      // Format a raw amount using on-demand asset metadata (symbol + decimals); falls back to the
      // raw value + a truncated asset id when the asset isn't in the fetched token lists.
      function fmtAssetIn(t) {
        const m = TOKENS.hydration[t.asset_in];
        if (m) return `${esc(fmtSig(t.amount_in, m.decimals))} <code>${esc(m.symbol)}</code>`;
        return `#<x-num value="${esc(t.asset_in)}"></x-num> · <x-num value="${esc(
          t.amount_in
        )}"></x-num>`;
      }

      function fmtOut(t) {
        if (t.dest_amount == null) return "";
        const m = TOKENS.dest[t.dest_asset];
        if (m) return `${esc(fmtSig(t.dest_amount, m.decimals))} <code>${esc(m.symbol)}</code>`;
        return `<x-num value="${esc(t.dest_amount)}"></x-num> <code title="${esc(
          t.dest_asset || ""
        )}">${esc(truncMiddle(t.dest_asset || "", 8, 6))}</code>`;
      }

      // Destination chain name (e.g. "near") from the 1Click token metadata, for the last leg label.
      function destChain(t) {
        return (t.dest_asset && TOKENS.dest[t.dest_asset]?.chain) || "destination";
      }

      function truncMiddle(s, head = 8, tail = 6) {
        return s.length > head + tail + 1 ? s.slice(0, head) + "…" + s.slice(-tail) : s;
      }

      function fmtAbs(ms) {
        const d = new Date(ms);
        const pad = (n) => String(n).padStart(2, "0");
        const tz = -d.getTimezoneOffset() / 60;
        const tzStr = "GMT" + (tz >= 0 ? "+" : "") + tz;
        return (
          d.getFullYear() +
          "-" +
          pad(d.getMonth() + 1) +
          "-" +
          pad(d.getDate()) +
          " " +
          pad(d.getHours()) +
          ":" +
          pad(d.getMinutes()) +
          ":" +
          pad(d.getSeconds()) +
          " " +
          tzStr
        );
      }

      function fmtDelta(ms) {
        const s = Math.round(ms / 1000);
        if (s < 60) return s + "s";
        const m = Math.floor(s / 60);
        const rs = s % 60;
        if (m < 60) return m + "m" + (rs ? " " + rs + "s" : "");
        const h = Math.floor(m / 60);
        const rm = m % 60;
        if (h < 24) return h + "h" + (rm ? " " + rm + "m" : "");
        const d = Math.floor(h / 24);
        const rh = h % 24;
        return d + "d" + (rh ? " " + rh + "h" : "");
      }

      class XAddr extends HTMLElement {
        connectedCallback() {
          const v = this.getAttribute("value") || "";
          const chain = this.getAttribute("chain") || "";
          if (!v) {
            this.textContent = "—";
            return;
          }
          const short = esc(truncMiddle(v, 8, 6));
          const url = ADDR_EXPLORER[chain]?.(v);
          this.innerHTML = url
            ? `<a href="${esc(url)}" target="_blank" rel="noopener"><code title="${esc(
                v
              )}">${short}</code></a>`
            : `<code title="${esc(v)} (click to copy)" style="cursor:pointer">${short}</code>`;
          if (!url) this.onclick = () => navigator.clipboard?.writeText(v);
        }
      }
      customElements.define("x-addr", XAddr);

      class XHash extends HTMLElement {
        connectedCallback() {
          const chain = this.getAttribute("chain") || "";
          const e = {
            txHash: this.getAttribute("value") || "",
            blockNumber: this.getAttribute("block") || "",
            logIndex: this.getAttribute("log-index") || "",
          };
          const info = EXPLORER[chain]?.(e) ?? { label: e.txHash, url: null };
          if (!info.label) {
            this.textContent = "—";
            return;
          }
          const short = esc(truncMiddle(info.label, 8, 6));
          this.innerHTML = info.url
            ? `<a href="${esc(info.url)}" target="_blank" rel="noopener"><code title="${esc(
                info.label
              )}">${short}</code></a>`
            : `<code title="${esc(info.label)}">${short}</code>`;
        }
      }
      customElements.define("x-hash", XHash);

      class XTime extends HTMLElement {
        connectedCallback() {
          const ms = Number(this.getAttribute("value"));
          if (!Number.isFinite(ms)) {
            this.textContent = "—";
            return;
          }
          this.textContent = fmtAbs(ms);
        }
      }
      customElements.define("x-time", XTime);

      class XDelta extends HTMLElement {
        connectedCallback() {
          const from = Number(this.getAttribute("from"));
          const to = Number(this.getAttribute("to"));
          if (!Number.isFinite(from) || !Number.isFinite(to)) {
            this.textContent = "";
            return;
          }
          const diff = to - from;
          const sign = diff >= 0 ? "+" : "-";
          this.textContent = "(" + sign + fmtDelta(Math.abs(diff)) + ")";
        }
      }
      customElements.define("x-delta", XDelta);

      class XNum extends HTMLElement {
        connectedCallback() {
          const v = this.getAttribute("value");
          if (v == null || v === "") {
            this.textContent = "—";
            return;
          }
          try {
            this.textContent = BigInt(v).toLocaleString("en-US");
          } catch {
            this.textContent = v;
          }
        }
      }
      customElements.define("x-num", XNum);

      // emitted (Hydration) → published (Moonbeam/Wormhole) → forwarded (Ethereum)
      const LEG_ORDER = ["emitted", "published", "forwarded"];
      const LEG_CHAIN = { emitted: "hydration", published: "moonbeam", forwarded: "ethereum" };

      const CHAIN_ICON = {
        wormhole:
          "https://cdn.jsdelivr.net/gh/sodazone/intergalactic-asset-metadata/v2/wormhole/1/icon.svg",
        hydration:
          "https://cdn.jsdelivr.net/gh/galacticcouncil/intergalactic-asset-metadata@latest/v2/polkadot/2034/icon.svg",
        moonbeam:
          "https://cdn.jsdelivr.net/gh/galacticcouncil/intergalactic-asset-metadata@latest/v2/polkadot/2004/icon.svg",
        ethereum:
          "https://cdn.jsdelivr.net/gh/galacticcouncil/intergalactic-asset-metadata@latest/v2/ethereum/1/icon.svg",
        // destination chains (keyed by 1Click `blockchain` value)
        near: "https://s2.coinmarketcap.com/static/img/coins/64x64/6535.png",
        zec: "https://s2.coinmarketcap.com/static/img/coins/64x64/1437.png",
      };

      function chainBadge(chain) {
        if (!chain) return "";
        const icon = CHAIN_ICON[chain];
        if (icon) return `<img class="chain-badge" src="${esc(icon)}" alt="${esc(chain)}"/>`;
        return `<span class="chain-badge">${esc(chain.slice(0, 1))}</span>`;
      }

      function detailsRows(t) {
        const sent = t.emitted;
        const recv = t.forwarded;
        const rows = [];
        rows.push(["ID", `<code>${esc(t.intent_id)}</code>`]);
        rows.push([
          "Status",
          `<span class="pill state-${esc(t.state)}"><span class="pill-dot"></span>${esc(
            t.state
          )}</span>`,
        ]);
        if (t.settlement_status) {
          rows.push(["Settlement", `<code>${esc(t.settlement_status)}</code> <span class="delta">(1Click)</span>`]);
        }
        if (sent) {
          rows.push(["Sent", `<x-time value="${esc(sent.blockTimestamp)}"></x-time>`]);
        }
        if (recv) {
          const delta = sent
            ? ` <span class="delta"><x-delta from="${esc(sent.blockTimestamp)}" to="${esc(
                recv.blockTimestamp
              )}"></x-delta></span>`
            : "";
          rows.push(["Received", `<x-time value="${esc(recv.blockTimestamp)}"></x-time>${delta}`]);
        }
        rows.push([
          "From",
          `<div class="party"><span class="party-head">${chainBadge("hydration")}hydration</span>${
            t.caller
              ? '<x-addr value="' + esc(t.caller) + '" chain="hydration"></x-addr>'
              : ""
          }</div>`,
        ]);
        // "To" is the recipient on the destination chain (the end user) — the Ethereum deposit
        // address is internal plumbing and intentionally not shown.
        if (t.dest_address) {
          const chain = destChain(t);
          const url = DEST_ADDR_EXPLORER[chain]?.(t.dest_address);
          const addr = url
            ? `<a href="${esc(url)}" target="_blank" rel="noopener"><code class="hash">${esc(
                t.dest_address
              )}</code></a>`
            : `<code class="hash">${esc(t.dest_address)}</code>`;
          rows.push([
            "To",
            `<div class="party"><span class="party-head">${chainBadge(chain)}${esc(
              chain
            )}</span>${addr}</div>`,
          ]);
        }
        rows.push(["Asset in", fmtAssetIn(t)]);
        // Value flow, in order: bridged (WETH out) → relay fee taken → forwarded to the receiver.
        rows.push(["Bridged", esc(fmtEth(t.eth_out)) + " <span class=\"delta\">(WETH out)</span>"]);
        if (t.relay_fee != null) {
          const r = t.relayer
            ? ` <span class="delta">by <x-addr value="${esc(
                t.relayer
              )}" chain="ethereum"></x-addr></span>`
            : "";
          rows.push(["Relay fee", esc(fmtEth(t.relay_fee)) + r]);
        }
        if (t.forwarded_amount != null) {
          const a = assetLabel(t.forwarded_asset);
          const amt =
            t.forwarded_asset && t.forwarded_asset.toLowerCase() === NATIVE
              ? esc(fmtEth(t.forwarded_amount))
              : `<x-num value="${esc(t.forwarded_amount)}"></x-num> <code title="${esc(a)}">${esc(
                  truncMiddle(a, 8, 6)
                )}</code>`;
          rows.push(["Forwarded", amt]);
        }
        const out = fmtOut(t);
        if (out) rows.push(["Asset out", out]);
        return rows.map(([k, v]) => `<dt>${esc(k)}</dt><dd>${v}</dd>`).join("");
      }

      function flowLine(t) {
        const reached = LEG_ORDER.filter((k) => t[k]);
        if (reached.length < 2) return "";
        const chains = reached.map((k) => LEG_CHAIN[k]);
        const first = t[reached[0]];
        const last = t[reached[reached.length - 1]];
        const delta =
          first && last
            ? ` <x-delta from="${esc(first.blockTimestamp)}" to="${esc(
                last.blockTimestamp
              )}"></x-delta>`
            : "";
        return chains.map(esc).join('<span class="arrow">→</span>') + delta;
      }

      const LEG_LABEL = { emitted: "emitted", published: "published", forwarded: "forwarded" };
      const CHAIN_REF_LABEL = { hydration: "Event", moonbeam: "Tx", ethereum: "Tx" };

      function legCard(kind, e) {
        if (!e) {
          const chain = LEG_CHAIN[kind] ?? "";
          return `
            <div class="leg pending">
              <div class="leg-head">
                <div class="leg-title">${
                  chain ? chainBadge(chain) + "<span>" + esc(chain) + "</span>" : ""
                }<span class="leg-kind pending">· PENDING</span></div>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" width="20" height="20" class="spin">
                  <circle cx="10" cy="10" r="8" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="2"/>
                  <path d="M10 2a8 8 0 018 8" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
            </div>`;
        }
        return `
          <div class="leg">
            <div class="leg-head">
              <div class="leg-title">${chainBadge(e.chain)}<span>${esc(
          e.chain
        )}</span><span class="leg-kind">· ${esc(LEG_LABEL[kind] ?? kind)}</span></div>
              <span class="check">✓</span>
            </div>
            <div class="leg-body">
              <div>${esc(
                CHAIN_REF_LABEL[e.chain] ?? "Tx"
              )}: <span class="hash"><x-hash value="${esc(e.txHash)}" block="${esc(
          e.blockNumber
        )}" log-index="${esc(e.logIndex)}" chain="${esc(e.chain)}"></x-hash></span></div>
              <div>Block: ${esc(e.blockNumber)}</div>
              <div><x-time value="${esc(e.blockTimestamp)}"></x-time></div>
            </div>
          </div>`;
      }

      function wormholeCard(t) {
        const ref = wormholeRef(t);
        const body = ref
          ? `<div>VAA: <span class="hash"><a href="${esc(
              ref.url
            )}" target="_blank" rel="noopener" title="${esc(ref.id)}"><code>${esc(
              truncMiddle(ref.id, 10, 8)
            )}</code></a></span></div><div>Seq: ${esc(t.wormhole_sequence)}</div>`
          : `<div class="leg-kind pending">awaiting VAA</div>`;
        return `
          <div class="leg${ref ? "" : " pending"}">
            <div class="leg-head">
              <div class="leg-title">${chainBadge(
                "wormhole"
              )}<span>wormhole</span><span class="leg-kind">· relayed</span></div>
              ${ref ? '<span class="check">✓</span>' : ""}
            </div>
            <div class="leg-body">${body}</div>
          </div>`;
      }

      // The final leg: the destination chain (e.g. NEAR), where the user's asset is RECEIVED. Built
      // from the 1Click settlement — labelled by the destination chain + terminal status, linking
      // the destination-chain (e.g. NEAR) tx.
      function destCard(t) {
        if (!t.dest_address && !t.dest_tx && !t.deposit_address) return ""; // nothing to show yet
        const chain = destChain(t);
        const done = t.state === "succeeded" || !!t.dest_tx;
        const kind =
          t.state === "succeeded"
            ? "received"
            : t.state === "refunded"
              ? "refunded"
              : t.state === "failed"
                ? "failed"
                : "pending";
        // destination-chain settlement tx: prefer 1Click's explorer url, else fall back to NEARBlocks
        const txUrl = t.dest_tx ? t.dest_tx_url || NEARBLOCKS_TX(t.dest_tx) : null;
        const txLine = t.dest_tx
          ? `<div>Tx: <span class="hash"><a href="${esc(
              txUrl
            )}" target="_blank" rel="noopener"><code>${esc(
              truncMiddle(t.dest_tx, 10, 8)
            )}</code></a></span></div>`
          : `<div class="leg-kind pending">awaiting settlement</div>`;
        // the full 1Click execution on the NEAR-Intents explorer, keyed by the deposit address
        const intentsLine = t.deposit_address
          ? `<div>Intents: <span class="hash"><a href="${esc(
              NEAR_INTENTS_TX(t.deposit_address)
            )}" target="_blank" rel="noopener"><code>explorer ↗</code></a></span></div>`
          : "";
        const out = fmtOut(t);
        const outLine = out ? `<div>${out}</div>` : "";
        return `
          <div class="leg${done ? "" : " pending"}">
            <div class="leg-head">
              <div class="leg-title">${chainBadge(chain)}<span>${esc(
          chain
        )}</span><span class="leg-kind${done ? "" : " pending"}">· ${esc(kind)}</span></div>
              ${done ? '<span class="check">✓</span>' : ""}
            </div>
            <div class="leg-body">${outLine}${txLine}${intentsLine}</div>
          </div>`;
      }

      function render(t) {
        const cards = [];
        for (const k of LEG_ORDER) {
          cards.push(legCard(k, t[k]));
          // the wormhole VAA card sits between the Moonbeam publish and the Ethereum forward
          if (k === "published") cards.push(wormholeCard(t));
        }
        cards.push(destCard(t)); // destination chain (NEAR/…) received — the final leg
        return `
          <section class="card">
            <dl class="details">${detailsRows(t)}</dl>
          </section>
          <h2>Legs</h2>
          <div class="flow">${flowLine(t)}</div>
          <div class="legs">${cards.join("")}</div>
        `;
      }

      let loaded = false;
      let lastIntent = null;
      function apply(t) {
        lastIntent = t;
        root.innerHTML = render(t);
        document.title = t.intent_id + " · " + t.state;
        if (!loaded) {
          root.classList.remove("appear");
          void root.offsetWidth;
          root.classList.add("appear");
        } else {
          root.classList.remove("flash");
          void root.offsetWidth;
          root.classList.add("flash");
        }
        loaded = true;
      }

      function notFound() {
        root.innerHTML = `
          <section class="card">
            <h1 style="margin:0 0 0.5rem;font-size:1.2rem">404</h1>
            <p style="margin:0;color:var(--muted)">Intent <code>${esc(
              ID
            )}</code> not found. Will appear here once indexed.</p>
          </section>`;
        document.title = ID + " · scan";
      }

      async function loadTokens() {
        try {
          const r = await fetch("/api/intents/tokens");
          if (r.ok) TOKENS = await r.json();
        } catch {
          // non-fatal — amounts just render raw without symbols
        }
      }

      async function load() {
        // Tokens load in the background and re-render once ready, so the intent renders immediately
        // (amounts gain symbols a beat later) instead of blocking on the metadata fetch.
        loadTokens().then(() => {
          if (lastIntent) apply(lastIntent);
        });
        try {
          const r = await fetch("/api/intents/" + encodeURIComponent(ID));
          if (r.status === 404) {
            notFound();
            return;
          }
          if (!r.ok) throw new Error("http " + r.status);
          apply(await r.json());
        } catch (err) {
          root.innerHTML = `<section class="card"><h1 style="margin:0">error</h1><p style="color:var(--muted)">${esc(
            err.message || String(err)
          )}</p></section>`;
        }
      }

      load();

      const es = new EventSource("/api/events?feature=intents");
      es.onopen = () => {
        connEl.textContent = "live";
        dotEl.classList.add("live");
      };
      es.onerror = () => {
        connEl.textContent = "reconnecting…";
        dotEl.classList.remove("live");
      };
      const onUpdate = (e) => {
        try {
          const u = JSON.parse(e.data);
          if (u.record && u.record.intent_id === ID) apply(u.record);
        } catch {}
      };
      es.addEventListener("created", onUpdate);
      es.addEventListener("updated", onUpdate);
    </script>
  </body>
</html>

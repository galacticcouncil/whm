version: "3.3"
services:
  scan:
    image: galacticcouncil/whmscan:latest
    environment:
      # Base
      - BASE_RPC_URL=
      - BASE_START_BLOCK=44386800
      # Ethereum
      - ETHEREUM_RPC_URL=
      - ETHEREUM_START_BLOCK=25300000
      # Moonbeam
      - MOONBEAM_RPC_URL=
      - MOONBEAM_START_BLOCK=15752000
      # Hydration
      - HYDRATION_WSS_URL=
      - HYDRATION_START_BLOCK=12011000
      # Contract addresses (no code fallbacks — set them here). Comma-separated lists.
      - BASEJUMP_BASE=0xf5b9334e44f800382cb47fc19669401d694e529b
      - BASEJUMP_LANDING_HYDRATION=0x70e9b12c3b19cb5f0e59984a5866278ab69df976
      - INTENT_EMITTER_HYDRATION=0x059ed5658c988976e73adb6597418970414f3dd0
      - INTENT_RECEIVER_ETHEREUM=0xf1a5fe4252d9a1c39b0fb9de1f19049ee57ed188
      #
      - DATABASE_URL=postgres://scan:scan@postgres:5432/scan
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - default
    logging:
      driver: json-file
    deploy:
      labels:
        swarmpit.service.deployment.autoredeploy: "true"
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=scan
      - POSTGRES_PASSWORD=scan
      - POSTGRES_DB=scan
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default
networks:
  default:
    driver: overlay
volumes:
  pgdata:
    driver: local

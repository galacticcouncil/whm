[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
message-emitter = "8KL6xhNL9mUVLSurKsB1jNiwgH4ifLk3gPtC5PccavNt"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "ts-mocha -p ./tsconfig.json -t 1000000 test/**/*.ts"

[test]
startup_wait = 20000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
dynamic_port_range = "8900-8950"
ledger = ".anchor/test-ledger"
rpc_port = 8898

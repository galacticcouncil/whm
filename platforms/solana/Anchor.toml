[toolchain]
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
sender = "BqbowXrcN2KbKswhBHLZwasFrDh9NV9qpJty7fLH6peJ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "ts-mocha -p ./tsconfig.json -t 1000000 test/**/*.ts"

[test]
startup_wait = 20000

[test.validator]
rpc_port = 8898
dynamic_port_range = "8900-8950"
bind_address = "127.0.0.1"
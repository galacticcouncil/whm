[package]
name = "message-emitter"
version = "0.1.0"
edition = "2021"

[lib]
name = "message_emitter"
crate-type = ["cdylib", "lib"]

[features]
default = ["mainnet"]
mainnet = ["wormhole-anchor-sdk/mainnet"]
local-logs = []
no-entrypoint = []
no-idl = []
no-log-ix-name = []
custom-heap = []
custom-panic = []
anchor-debug = []
cpi = ["no-entrypoint"]
idl-build = ["anchor-lang/idl-build", "wormhole-anchor-sdk/idl-build"]

[lints]
workspace = true

[dependencies]
anchor-lang = "0.32.1"
wormhole-anchor-sdk = { git = "https://github.com/wormhole-foundation/wormhole-scaffolding", default-features = false }

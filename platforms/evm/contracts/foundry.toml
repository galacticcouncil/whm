[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]

[soldeer]
remappings_generate = false

[dependencies]
forge-std = { version = "1.14.0", git = "https://github.com/foundry-rs/forge-std.git", tag = "v1.14.0" }
openzeppelin-contracts-upgradeable = { version = "5.5.0", git = "https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable.git", tag = "v5.5.0" }
openzeppelin-contracts = { version = "5.5.0", git = "https://github.com/OpenZeppelin/openzeppelin-contracts.git", tag = "v5.5.0" }
wormhole-solidity-sdk = { version = "0.1.0", git = "https://github.com/wormhole-foundation/wormhole-solidity-sdk.git", rev = "b9e129e65d34827d92fceeed8c87d3ecdfc801d0" }

[rpc_endpoints]
mainnet = "https://ethereum-rpc.publicnode.com"
